<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Zadanie 10</title>
    <link rel="stylesheet" href="style.css" />
    <script>
      function drukujLinie(ilosc){
        for (let i = 0; i <= ilosc; i++){
          document.write("-");
        }
        document.write("<br>");
      }
    </script>
  </head>
  <body>
    <h1>Zadanie 10: Pętle</h1>
    <p>Generator linii.</p>
    <div id="wynik">
      <script>
        drukujLinie(10);
        drukujLinie(50);
        drukujLinie(5);
      </script>
    </div>
    <footer>
      <p>Emilia Janosik 1p</p>
    </footer>
  </body>
</html>
