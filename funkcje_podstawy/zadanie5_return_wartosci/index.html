<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Zadanie 5</title>
    <link rel="stylesheet" href="style.css" />
    <script>
      function przeliczNaMetry(km){
        let metry = km * 1000;
        return metry;
      }
    </script>
  </head>
  <body>
    <h1>Zadanie 5: Return</h1>
    <p>Przeliczanie kilometrów na metry.</p>
    <div id="wynik">
      <script>
        let = wynik1 = przeliczNaMetry(5);
        let = wynik2 = przeliczNaMetry(1.5);
        document.write("Wynik: " + wynik1 + "<br>");
        document.write("Wynik: " + wynik2 + "<br>");
      </script>
    </div>

      <p>Emilia Janosik 1p</p>
    </footer>
  </body>
