<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Zadanie 4</title>
    <link rel="stylesheet" href="style.css" />
    <script>
      function poleProstokata(a, b){
        let wynik = a * b;
        document.write("Pole prostokąta o bokach " + a + " i " + b +  " wynosi " + wynik + "<br>")
      }
    </script>
  </head>
  <body>
    <h1>Zadanie 4: Wiele argumentów</h1>
    <p>Obliczanie pola prostokąta.</p>
    <div id="wynik">
      <script>
        poleProstokata(6, 7);
        poleProstokata(8, 3);
        poleProstokata(5, 2);
      </script>
    </div>
    <footer>
      <p>Emilia Janosik 1p</p>
    </footer>
  </body>
</html>
